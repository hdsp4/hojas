<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal HDS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F9FAFB;
            --text-main: #111827;
            --text-muted: #6B7280;
            --card-bg: #FFFFFF;
            --border-color: #E5E7EB;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
            padding-bottom: 2rem;
        }

        header {
            background-color: var(--card-bg);
            padding: 1.5rem 1rem;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            font-size: 1.125rem;
            border: 2px solid var(--border-color);
            border-radius: 9999px;
            outline: none;
            transition: var(--transition);
            background-color: var(--bg-color);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background-color: var(--card-bg);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 1.5rem;
            height: 1.5rem;
        }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .results-info {
            margin-bottom: 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            flex: 1;
            min-width: 0;
            padding-right: 1rem;
        }

        .fragrance-name {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fragrance-code {
            font-size: 0.875rem;
            color: var(--primary);
            font-weight: 600;
            background-color: rgba(79, 70, 229, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            display: inline-block;
            width: fit-content;
        }

        .btn-open {
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            white-space: nowrap;
            border: none;
            cursor: pointer;
        }

        .btn-open:hover {
            background-color: var(--primary-hover);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            background-color: var(--card-bg);
            border-radius: 1rem;
            border: 1px dashed var(--border-color);
        }

        .empty-state svg {
            width: 3rem;
            height: 3rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 1.125rem;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .card {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
            .card-content {
                padding-right: 0;
            }
            .btn-open {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Portal HDS</h1>
        <div class="search-container">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar por código o fragancia..." aria-label="Buscar fragancia">
        </div>
    </header>

    <main>
        <div class="results-info" id="resultsInfo">Cargando datos...</div>
        <div class="list-container" id="listContainer">
            <div class="loading">Cargando fragancias...</div>
        </div>
    </main>

    <script>
        let items = [];
        const searchInput = document.getElementById('searchInput');
        const listContainer = document.getElementById('listContainer');
        const resultsInfo = document.getElementById('resultsInfo');

        // Load data on init
        async function init() {
            try {
                const response = await fetch('indice.json');
                if (!response.ok) {
                    throw new Error('Error al cargar el índice');
                }
                items = await response.json();
                renderList(items);
            } catch (error) {
                console.error('Error fetching data:', error);
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <p>No se pudo cargar la base de datos.</p>
                    </div>`;
                resultsInfo.textContent = '';
            }
        }

        // Render the list of items
        function renderList(data) {
            listContainer.innerHTML = '';
            resultsInfo.textContent = `Mostrando ${data.length} resultado${data.length !== 1 ? 's' : ''}`;

            if (data.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p>No se encontraron resultados.</p>
                    </div>
                `;
                return;
            }

            const fragment = document.createDocumentFragment();

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Content section
                const content = document.createElement('div');
                content.className = 'card-content';
                
                const code = document.createElement('span');
                code.className = 'fragrance-code';
                code.textContent = `[${item.codigo || 'S/C'}]`;
                
                const name = document.createElement('span');
                name.className = 'fragrance-name';
                name.textContent = item.nombre;
                
                content.appendChild(code);
                content.appendChild(name);
                
                // Action section
                const btn = document.createElement('a');
                btn.className = 'btn-open';
                btn.href = item.archivo;
                btn.target = '_blank';
                btn.rel = 'noopener noreferrer';
                btn.innerHTML = `
                    Abrir PDF
                    <svg style="width:1.25rem; height:1.25rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                `;

                card.appendChild(content);
                card.appendChild(btn);
                
                fragment.appendChild(card);
            });

            listContainer.appendChild(fragment);
        }

        // Filter function
        function handleSearch(e) {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                renderList(items);
                return;
            }
            
            const filtered = items.filter(item => {
                const cod = item.codigo ? item.codigo.toLowerCase() : '';
                const nom = item.nombre ? item.nombre.toLowerCase() : '';
                return cod.includes(query) || nom.includes(query);
            });
            
            renderList(filtered);
        }

        // Add event listener to input
        searchInput.addEventListener('input', handleSearch);

        // Start
        init();
    </script>
</body>
</html>
